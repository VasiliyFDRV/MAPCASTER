<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Dice Probe</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 35% 25%, #1f2635 0%, #0f1116 55%, #0a0c11 100%);
      font-family: Segoe UI, Arial, sans-serif;
    }
    .stage {
      position: absolute;
      inset: 0;
      perspective: 900px;
      display: grid;
      place-items: center;
    }
    .dice-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      transform-style: preserve-3d;
      animation: drop 2200ms ease-in-out infinite;
    }
    .dice {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 110px;
      height: 110px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%) rotateX(-28deg) rotateY(42deg);
      animation: spin 2200ms cubic-bezier(.2,.75,.2,1) infinite;
    }
    .face {
      position: absolute;
      width: 110px;
      height: 110px;
      background: linear-gradient(145deg, #f8fafc, #d9e0eb);
      border: 2px solid #9aa6ba;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #222b37;
      font-size: 34px;
      font-weight: 700;
      box-sizing: border-box;
      backface-visibility: hidden;
    }
    .f1 { transform: rotateY(0deg) translateZ(55px); }
    .f2 { transform: rotateY(90deg) translateZ(55px); }
    .f3 { transform: rotateY(180deg) translateZ(55px); }
    .f4 { transform: rotateY(-90deg) translateZ(55px); }
    .f5 { transform: rotateX(90deg) translateZ(55px); }
    .f6 { transform: rotateX(-90deg) translateZ(55px); }

    .shadow {
      position: absolute;
      width: 130px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.42);
      filter: blur(4px);
      left: 50%;
      top: calc(50% + 92px);
      transform: translateX(-50%);
      animation: shadowPulse 2200ms ease-in-out infinite;
    }

    .hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      color: #cfd7e6;
      font-size: 13px;
      opacity: 0.9;
      background: rgba(0,0,0,0.35);
      padding: 7px 10px;
      border-radius: 8px;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -85%) rotateX(-220deg) rotateY(35deg) rotateZ(120deg); }
      55% { transform: translate(-50%, -50%) rotateX(12deg) rotateY(450deg) rotateZ(12deg); }
      100% { transform: translate(-50%, -50%) rotateX(0deg) rotateY(402deg) rotateZ(0deg); }
    }
    @keyframes drop {
      0% { transform: translateY(-85px); }
      55% { transform: translateY(0px); }
      70% { transform: translateY(-24px); }
      84% { transform: translateY(0px); }
      92% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    @keyframes shadowPulse {
      0% { transform: translateX(-50%) scale(0.8); opacity: 0.2; }
      55% { transform: translateX(-50%) scale(1.08); opacity: 0.45; }
      100% { transform: translateX(-50%) scale(1.0); opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="shadow"></div>
    <div class="dice-wrap">
      <div class="dice" aria-label="d6">
        <div class="face f1">1</div>
        <div class="face f2">2</div>
        <div class="face f3">3</div>
        <div class="face f4">4</div>
        <div class="face f5">5</div>
        <div class="face f6">6</div>
      </div>
    </div>
  </div>
  <div class="hint">WebEngine probe: CSS 3D d6</div>
</body>
</html>
