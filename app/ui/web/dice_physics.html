<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Physics Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      perspective: 1250px;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .dice-wrap {
      position: absolute;
      width: 88px;
      height: 88px;
      transform-style: preserve-3d;
      will-change: transform;
      opacity: 0;
    }

    .dice {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38px;
      height: 38px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    .face {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 2px;
      border: none;
      box-sizing: border-box;
      background: #c8c8c8;
      color: #222222;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 800;
      backface-visibility: hidden;
      box-shadow: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 25px;
      height: 25px;
      transform: translate(-50%, -50%) translateZ(0.01px);
      border-radius: 2px;
      background: rgba(36, 36, 36, 0.88);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.08),
        inset 0 -2px 4px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .f1 { transform: rotateY(0deg) translateZ(19px); }
    .f2 { transform: rotateY(90deg) translateZ(19px); }
    .f3 { transform: rotateY(180deg) translateZ(19px); }
    .f4 { transform: rotateY(-90deg) translateZ(19px); }
    .f5 { transform: rotateX(90deg) translateZ(19px); }
    .f6 { transform: rotateX(-90deg) translateZ(19px); }


    .d8 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 68px;
      height: 68px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d8-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 41.57px;
      margin-left: -24px;
      margin-top: -27.71px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding-top: 8px;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 66.666%;
    }

    .d8-core {
      display: none;
    }

    .d8-face.t1 { transform: rotateY(45deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t2 { transform: rotateY(135deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t3 { transform: rotateY(225deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t4 { transform: rotateY(315deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.b1 { transform: rotateY(45deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b2 { transform: rotateY(135deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b3 { transform: rotateY(225deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b4 { transform: rotateY(315deg) rotateX(35.264deg) translateZ(19.6px); }
    .d4 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 82px;
      height: 82px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d4-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      margin-left: -12px;
      margin-top: -12px;
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
    }

    .d4-core {
      display: none;
    }

    .d4-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      display: inline-block;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .d10 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 88px;
      height: 88px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d10-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44px;
      height: 50.806px;
      margin-left: -22px;
      margin-top: -25.403px;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: block;
      line-height: 1;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
      border: none;
    }

    .d10-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
    }

    .d10-mark {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, 0);
      font-size: 0.82em;
      line-height: 1;
      color: #232323;
      opacity: 1;
      pointer-events: none;
    }

    .d12-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      display: inline-block;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .d20-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      display: inline-block;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .d12-mark {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, 0);
      font-size: 0.82em;
      line-height: 1;
      color: #232323;
      opacity: 1;
      pointer-events: none;
    }

    .d10-core {
      display: none;
    }

    .d12 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 92px;
      height: 92px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d12-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 33.4px;
      height: 33.4px;
      margin-left: -16.7px;
      margin-top: -16.7px;
      clip-path: polygon(50% 0%, 97.5528258% 34.5491503%, 79.3892626% 90.4508497%, 20.6107374% 90.4508497%, 2.4471742% 34.5491503%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
    }

    .d12-core {
      display: none;
    }

    .d20 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d20-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 29.4449px;
      margin-left: -17px;
      margin-top: -14.72245px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      padding-top: 0;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
    }

    .d20-core {
      display: none;
    }
    .shadow {
      position: absolute;
      width: 68px;
      height: 14px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.26);
      left: 0;
      top: 0;
      filter: blur(4px);
      will-change: transform, opacity;
      opacity: 0;
    }
  </style>

<body>

  <script>
    (function () {
      const scene = document.getElementById('scene');
      const wrapTemplate = document.getElementById('wrap-template');
      const wrapD8Template = document.getElementById('wrap-d8-template');
      const wrapD4Template = document.getElementById('wrap-d4-template');
      const wrapD10Template = document.getElementById('wrap-d10-template');
      const wrapD12Template = document.getElementById('wrap-d12-template');
      const wrapD20Template = document.getElementById('wrap-d20-template');

      // Fixed per-face label correction for d10 (degrees).
      // Keeping this in one table avoids side effects when tuning individual faces.
      const D10_LABEL_ROTATE_OFFSETS = {
        1: 0,
        2: 180,
        3: 180,
        4: 180,
        5: 0,
        6: 180,
        7: 180,
        8: 0,
        9: 0,
        10: 180,
      };
      const shadowTemplate = document.getElementById('shadow-template');

      let rollSeq = 0;
      const activeRollStates = new Map();

      const COLLISION_RESTITUTION = 0.14;
      const COLLISION_FRICTION = 0.06;
      const COLLISION_MAX_IMPULSE = 0.32;
      const COLLISION_MAX_SPEED = 0.45;
      const COLLISION_PUSH_FACTOR = 0.34;
      const COLLISION_PUSH_BIAS = 0.00;
      const COLLISION_CONTACT_DAMP = 0.985;
      const COLLISION_SLOP = 1.4;
      const COLLISION_MIN_NORMAL_SPEED = 0.02;
      const COLLISION_MAX_PUSH = 2.0;
      const COLLISION_REST_PENETRATION = 0.9;
      const COLLISION_REST_NORMAL_SPEED = 0.015;
      const COLLISION_GROUND_Z_GAP = 18;
      const COLLISION_GROUND_Z_MAX = 24;

      function apparentScale(state) {
        const zNorm = clamp(state.z / 260, 0, 1);
        return 0.78 + (1 - zNorm) * 0.22;
      }

      function collisionRadius(state) {
        return 36 * apparentScale(state);
      }

      function obbFromState(state) {
        const ang = Number(state.rz || 0) * Math.PI / 180;
        const ux = Math.cos(ang);
        const uy = Math.sin(ang);
        const vx = -uy;
        const vy = ux;
        const half = 25.5 * apparentScale(state);
        return {
          cx: Number(state.px || 0),
          cy: Number(state.py || 0),
          halfX: half,
          halfY: half,
          ux,
          uy,
          vx,
          vy
        };
      }

      function projectObbOnAxis(obb, ax, ay) {
        const c = obb.cx * ax + obb.cy * ay;
        const r =
          obb.halfX * Math.abs(obb.ux * ax + obb.uy * ay)
          + obb.halfY * Math.abs(obb.vx * ax + obb.vy * ay);
        return { min: c - r, max: c + r };
      }

      function satObbOverlap(a, b) {
        const axes = [
          [a.ux, a.uy],
          [a.vx, a.vy],
          [b.ux, b.uy],
          [b.vx, b.vy]
        ];

        let bestOverlap = 1e9;
        let bestAx = 0;
        let bestAy = 0;

        for (let i = 0; i < axes.length; i += 1) {
          let ax = axes[i][0];
          let ay = axes[i][1];
          const mag = Math.hypot(ax, ay);
          if (mag < 1e-6) continue;
          ax /= mag;
          ay /= mag;

          const pa = projectObbOnAxis(a, ax, ay);
          const pb = projectObbOnAxis(b, ax, ay);
          const overlap = Math.min(pa.max, pb.max) - Math.max(pa.min, pb.min);
          if (overlap <= 0) {
            return { collides: false, overlap: 0, nx: 0, ny: 0 };
          }
          if (overlap < bestOverlap) {
            bestOverlap = overlap;
            bestAx = ax;
            bestAy = ay;
          }
        }

        const dirX = b.cx - a.cx;
        const dirY = b.cy - a.cy;
        if (dirX * bestAx + dirY * bestAy < 0) {
          bestAx = -bestAx;
          bestAy = -bestAy;
        }

        return { collides: true, overlap: bestOverlap, nx: bestAx, ny: bestAy };
      }

      function pickSpawnX(centerX, w, py) {
        const minX = centerX - w * 0.10;
        const maxX = centerX + w * 0.10;

        let bestX = centerX;
        let bestScore = -1e9;
        for (let tries = 0; tries < 12; tries += 1) {
          const candidate = clamp(centerX + random(-w * 0.09, w * 0.09), minX, maxX);
          let minSep = 1e9;
          for (const other of activeRollStates.values()) {
            if (!other || other.phase === 'fade') {
              continue;
            }
            const dy = Math.abs(candidate - other.px);
            const pyDist = Math.abs(py - other.py);
            if (pyDist > 90) {
              continue;
            }
            minSep = Math.min(minSep, dy);
          }
          if (minSep > bestScore) {
            bestScore = minSep;
            bestX = candidate;
          }
          if (minSep > 64) {
            return candidate;
          }
        }

        return bestX;
      }

      function resolveDiceCollisions(state, bounds) {
        if (!state || state.phase === 'fade') {
          return;
        }

        for (const other of activeRollStates.values()) {
          if (!other || other === state || other.phase === 'fade') {
            continue;
          }
          if (Number(state.rollId || 0) >= Number(other.rollId || 0)) {
            continue;
          }

          if (Number(state.z || 0) > COLLISION_GROUND_Z_MAX || Number(other.z || 0) > COLLISION_GROUND_Z_MAX) {
            continue;
          }

          const zGap = Math.abs(Number(state.z || 0) - Number(other.z || 0));
          if (zGap > COLLISION_GROUND_Z_GAP) {
            continue;
          }

          const dx = state.px - other.px;
          const dy = state.py - other.py;
          const minDist = collisionRadius(state) + collisionRadius(other);
          const distSq = dx * dx + dy * dy;
          if (distSq >= minDist * minDist) {
            continue;
          }

          const obbA = obbFromState(state);
          const obbB = obbFromState(other);
          const sat = satObbOverlap(obbA, obbB);
          if (!sat.collides || sat.overlap <= COLLISION_SLOP) {
            continue;
          }

          const nx = sat.nx;
          const ny = sat.ny;
          const penetration = sat.overlap - COLLISION_SLOP;
          if (penetration <= 0) {
            continue;
          }

          const rvx = state.vx - other.vx;
          const rvy = state.vy - other.vy;
          const relNormal = rvx * nx + rvy * ny;
          if (penetration < COLLISION_REST_PENETRATION && Math.abs(relNormal) < COLLISION_REST_NORMAL_SPEED) {
            continue;
          }

          const push = Math.min(COLLISION_MAX_PUSH, penetration * COLLISION_PUSH_FACTOR + COLLISION_PUSH_BIAS);
          state.px -= nx * push * 0.5;
          state.py -= ny * push * 0.5;
          other.px += nx * push * 0.5;
          other.py += ny * push * 0.5;

          state.px = clamp(state.px, bounds.minX, bounds.maxX);
          state.py = clamp(state.py, bounds.minY, bounds.maxY);
          other.px = clamp(other.px, bounds.minX, bounds.maxX);
          other.py = clamp(other.py, bounds.minY, bounds.maxY);

          if (relNormal < -COLLISION_MIN_NORMAL_SPEED) {
            let impulse = -(1 + COLLISION_RESTITUTION) * relNormal * 0.5;
            impulse = clamp(impulse, 0, COLLISION_MAX_IMPULSE);
            state.vx += nx * impulse;
            state.vy += ny * impulse;
            other.vx -= nx * impulse;
            other.vy -= ny * impulse;
          }

          const tx = -ny;
          const ty = nx;
          const relTan = rvx * tx + rvy * ty;
          state.vx -= tx * relTan * COLLISION_FRICTION * 0.5;
          state.vy -= ty * relTan * COLLISION_FRICTION * 0.5;
          other.vx += tx * relTan * COLLISION_FRICTION * 0.5;
          other.vy += ty * relTan * COLLISION_FRICTION * 0.5;

          state.vx = clamp(state.vx * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
          state.vy = clamp(state.vy * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
          other.vx = clamp(other.vx * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
          other.vy = clamp(other.vy * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
        }
      }

      function createRollNodes(kind) {
        if (!scene || !shadowTemplate) {
          return null;
        }

        const spec = getDiceSpec(kind);
        const sourceTemplate = spec && spec.template ? spec.template : wrapTemplate;
        if (!sourceTemplate) {
          return null;
        }

        const shadow = shadowTemplate.cloneNode(true);
        shadow.removeAttribute('id');
        shadow.style.display = 'block';

        const wrap = sourceTemplate.cloneNode(true);
        wrap.removeAttribute('id');
        wrap.style.display = 'block';

        const dice = wrap.querySelector('.dice');
        if (!dice) {
          return null;
        }

        const faceEls = Array.from(dice.querySelectorAll(spec.faceSelector));
        const coreEl = dice.querySelector(spec.coreSelector);

        if (spec && spec.dynamicFaceTransforms && Array.isArray(spec.faceTransforms) && faceEls.length === spec.faceTransforms.length) {
          for (let i = 0; i < faceEls.length; i += 1) {
            const ft = spec.faceTransforms[i] || {};
            const rx = Number(ft.rx || 0);

          if (Math.abs(cb.z - ca.z) > 1e-6) return cb.z - ca.z;
          return Math.atan2(ca.y, ca.x) - Math.atan2(cb.y, cb.x);
        });
        return faces;
      }

      function buildD12FaceData() {
        const phi = (1 + Math.sqrt(5)) * 0.5;
        const invPhi = 1 / phi;
        const s = 15.5;
        const verts = [];
        const add = (x, y, z) => verts.push(vec3(x * s, y * s, z * s));

        for (let sx = -1; sx <= 1; sx += 2) {
          for (let sy = -1; sy <= 1; sy += 2) {
            for (let sz = -1; sz <= 1; sz += 2) add(sx, sy, sz);
          }
        }
        for (let sy = -1; sy <= 1; sy += 2) {
          for (let sz = -1; sz <= 1; sz += 2) add(0, sy * invPhi, sz * phi);
        }
        for (let sx = -1; sx <= 1; sx += 2) {
          for (let sy = -1; sy <= 1; sy += 2) add(sx * invPhi, sy * phi, 0);
        }
        for (let sx = -1; sx <= 1; sx += 2) {
          for (let sz = -1; sz <= 1; sz += 2) add(sx * phi, 0, sz * invPhi);
        }

        const faces = buildConvexPolyFaces(verts, 5);
        const faceTransforms = [];
        const faceNormals = [];
        for (let i = 0; i < faces.length; i += 1) {
          const fv = faces[i].ids.map((idx) => verts[idx]);
          const c = centroidVec3(fv);
          let n = normalizeVec3Obj(crossVec3(subVec3(fv[1], fv[0]), subVec3(fv[2], fv[1])));
          if (dotVec3(n, c) < 0) n = scaleVec3(n, -1);

          let up = subVec3(vec3(0, 0, 1), scaleVec3(n, dotVec3(vec3(0, 0, 1), n)));
          if (Math.hypot(up.x, up.y, up.z) <= 1e-6) {
            up = subVec3(vec3(0, 1, 0), scaleVec3(n, dotVec3(vec3(0, 1, 0), n)));
          }
          up = normalizeVec3Obj(up);
          let right = normalizeVec3Obj(crossVec3(up, n));
          if (Math.hypot(right.x, right.y, right.z) <= 1e-6) {
            right = vec3(1, 0, 0);
          }

          let topIdx = 0;
          let bestUp = -1e9;
          let bestRight = 1e9;
          for (let k = 0; k < fv.length; k += 1) {
            const rel = subVec3(fv[k], c);
            const u = dotVec3(rel, up);
            const r = dotVec3(rel, right);
            if (u > bestUp + 1e-6 || (Math.abs(u - bestUp) <= 1e-6 && r < bestRight)) {
              topIdx = k;
              bestUp = u;
              bestRight = r;
            }
          }
          let hint = normalizeVec3Obj(subVec3(fv[topIdx], c));
          if (Math.hypot(hint.x, hint.y, hint.z) <= 1e-6) {
            hint = up;
          }

          const built = buildFaceTransformFromVertices(i + 1, fv, 0, 0.00, hint);
          const t = built.transform;
          faceTransforms.push({
            id: i + 1,
            rx: t.rx,
            ry: t.ry,
            rz: normalizeAngle(t.rz + 180),
            tz: t.tz,
          });
          faceNormals.push(normalizeVec3Obj(built.normal));
        }

        return {
          faceTransforms: faceTransforms.filter(Boolean),
          faceNormals: faceNormals.filter(Boolean),
        };
      }

      const D12_FACE_DATA = buildD12FaceData();

      function buildD20FaceData() {
        const phi = (1 + Math.sqrt(5)) * 0.5;
        const s = 17.8;
        const verts = [];
        const add = (x, y, z) => verts.push(vec3(x * s, y * s, z * s));

        for (let y = -1; y <= 1; y += 2) {
          for (let z = -phi; z <= phi; z += 2 * phi) add(0, y, z);
        }
        for (let x = -1; x <= 1; x += 2) {
          for (let y = -phi; y <= phi; y += 2 * phi) add(x, y, 0);
        }
        for (let x = -phi; x <= phi; x += 2 * phi) {
          for (let z = -1; z <= 1; z += 2) add(x, 0, z);
        }

        const faces = buildConvexPolyFaces(verts, 3);
        const faceTransforms = [];
        const faceNormals = [];
        for (let i = 0; i < faces.length; i += 1) {
          const fv = faces[i].ids.map((idx) => verts[idx]);
          const c = centroidVec3(fv);
          let n = normalizeVec3Obj(crossVec3(subVec3(fv[1], fv[0]), subVec3(fv[2], fv[1])));
          if (dotVec3(n, c) < 0) n = scaleVec3(n, -1);

          let up = subVec3(vec3(0, 0, 1), scaleVec3(n, dotVec3(vec3(0, 0, 1), n)));
          if (Math.hypot(up.x, up.y, up.z) <= 1e-6) {
            up = subVec3(vec3(0, 1, 0), scaleVec3(n, dotVec3(vec3(0, 1, 0), n)));
          }
          up = normalizeVec3Obj(up);

          let topIdx = 0;
          let bestUp = -1e9;
          for (let k = 0; k < fv.length; k += 1) {
            const rel = subVec3(fv[k], c);
            const u = dotVec3(rel, up);
            if (u > bestUp) {
              bestUp = u;
              topIdx = k;
            }
          }
          const hint = normalizeVec3Obj(subVec3(fv[topIdx], c));
          const built = buildFaceTransformFromVertices(i + 1, fv, 0, 0.00, hint);
          faceTransforms.push(built.transform);
          faceNormals.push(normalizeVec3Obj(built.normal));
        }

        return {

          faceNormals: faceNormals.filter(Boolean),

      function buildD4FaceData() {
        // Truncated tetrahedron d4:
        // 4 small triangular faces (values) + 4 larger hexagonal faces.
        // Edge ratio on hex faces: long:short = x:(x/3) achieved by t = 0.2.
        const longEdge = 44;
        const baseEdge = (5 / 3) * longEdge;
        const truncT = 0.2;

        const n = 1 / Math.sqrt(3);
        const base = [
          vec3( n,  n,  n),
          vec3(-n, -n,  n),
          vec3(-n,  n, -n),
          vec3( n, -n, -n),
        ];

        const unitEdge = Math.hypot(base[0].x - base[1].x, base[0].y - base[1].y, base[0].z - base[1].z);
        const scale = baseEdge / unitEdge;
        const verts = base.map((v) => vec3(v.x * scale, v.y * scale, v.z * scale));

        const neighbors = [
          [1, 2, 3],
          [0, 3, 2],
          [0, 1, 3],
          [0, 2, 1],
        ];

        const edgePoint = (i, j) => {
          const a = verts[i];
          const b = verts[j];
          return vec3(
            a.x + (b.x - a.x) * truncT,
            a.y + (b.y - a.y) * truncT,
            a.z + (b.z - a.z) * truncT,
          );
        };

        const faceDefs = [];

        // 4 small triangular value faces (one per truncated vertex).
        for (let i = 0; i < 4; i += 1) {
          const ns = neighbors[i];
          faceDefs.push({
            id: faceDefs.length + 1,
            value: i + 1,
            vertices: [edgePoint(i, ns[0]), edgePoint(i, ns[1]), edgePoint(i, ns[2])],
          });
        }

        // 4 hex faces (former tetra faces after truncation).
        const tetraFaces = [
          [0, 1, 2],
          [0, 3, 1],
          [0, 2, 3],
          [1, 3, 2],
        ];
        for (let f = 0; f < tetraFaces.length; f += 1) {
          const a = tetraFaces[f][0];
          const b = tetraFaces[f][1];
          const c = tetraFaces[f][2];
          faceDefs.push({
            id: faceDefs.length + 1,
            value: 0,
            vertices: [
              edgePoint(a, b),
              edgePoint(b, a),
              edgePoint(b, c),
              edgePoint(c, b),
              edgePoint(c, a),
              edgePoint(a, c),
            ],
          });
        }

        const faceTransforms = [];
        const faceNormals = [];
        const valueFaceIds = [];
        const faceValueById = {};

        for (let i = 0; i < faceDefs.length; i += 1) {
          const f = faceDefs[i];
          const built = buildFaceTransformFromVertices(f.id, f.vertices, 0, 0.00, null);
          faceTransforms.push({
            id: f.id,
            rx: built.transform.rx,
            ry: built.transform.ry,
            rz: built.transform.rz,
            tz: built.transform.tz,
            fx: built.transform.fx,
            fy: built.transform.fy,
            fw: built.transform.fw,
            fh: built.transform.fh,
            clipPath: built.transform.clipPath,
            labelRotate: built.transform.labelRotate,
            labelCxPct: built.transform.labelCxPct,
            labelCyPct: built.transform.labelCyPct,
            faceValue: Number(f.value || 0),
          });
          faceNormals.push(normalizeVec3Obj(built.normal));
          if (Number(f.value || 0) > 0) {
            valueFaceIds.push(f.id);
            faceValueById[f.id] = Number(f.value);
          }
        }

        return {
          faceTransforms,
          faceNormals,
          valueFaceIds,
          faceValueById,
        };
      }

          if (nWorld.z > bestDepth) {

          for (let j = 0; j < normals.length; j += 1) {

              const baseAssist = (0.014 + closeness * 0.11) * settleGate * alignSpeedBoost;
              const assist = baseAssist + plopBoost;

              const tMax = alignConfig.tMax;
              const t = clamp(assist * dt * 60, 0, tMax);
              applyAlignOrientationStep(state, target, t, alignConfig);

              // Kill shaking once close to stable face-up orientation.
              const forceSnapDistance = alignConfig.forceSnapDistance;
              const forceSnap = state.groundedFor > alignForceSnapDelay && alignDistance < forceSnapDistance;
              if (alignDistance < 3.2 || forceSnap) {
                applyAlignSnap(state, target);
                
                state.vrx = 0;
                state.vry = 0;
                state.vrz = 0;
                state.alignReady = true;
                if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs <= 0) {
                  state.resultMeasureAtMs = ts + resultMeasureDelayMs;
                }
                console.log(`[dice-debug] roll=${rollId} align-end reason=${forceSnap ? "force" : "normal"} ad=${alignDistance.toFixed(3)} rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} frames=${state.alignFrames}`);
                if (state.modelKind === 'd8') {
                  const d8Normals = getDiceSpec('d8').faceNormals;
                  const n = d8Normals[Math.max(0, Math.min(d8Normals.length - 1, Number(state.resultFace || 1) - 1))];
                  const nw = rotateVec(n, state.rx, state.ry, state.rz);
                  const upNow = normalizeVec3(nw.x, nw.y, nw.z).z;
                  console.log(`[dice-d8-align] roll=${rollId} end reason=${forceSnap ? "force" : "normal"} face=${state.resultFace} ad=${alignDistance.toFixed(3)} frames=${state.alignFrames} upNow=${upNow.toFixed(4)} rz=${state.rz.toFixed(2)}`);
                }
              } else {
                state.vrx *= 0.66;
                state.vry *= 0.72;
                state.vrz *= 0.66;
              }
            } else if (!grounded) {
              if (state.alignStarted && !state.alignReady) {
                console.log(`[dice-debug] roll=${rollId} align-abort rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} frames=${state.alignFrames}`);
              }
              state.alignTarget = null;
              state.alignReady = false;
              state.alignStarted = false;
              state.alignElapsed = 0;
              state.alignProbeLogged = false;
            }


            const resting = grounded && planarSpeed < 0.025 && alignSpin < 2.4 && (alignEnabled ? state.alignReady : true);
            if (resting) {
              state.settledFor += dt;
            } else {
              state.settledFor = 0;
            }

            if (state.settledFor > 0.34) {
              console.log(`[dice-debug] roll=${rollId} hold-enter rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} alignReady=${state.alignReady}`);
              if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs <= 0) {
                state.resultMeasureAtMs = ts + resultMeasureDelayMs;
              }
              state.vx = 0;
              state.vy = 0;
              state.vz = 0;
              state.vrx = 0;
              state.vry = 0;
              state.vrz = 0;
              state.phase = 'hold';
              state.phaseTime = 0;
            }
          } else if (state.phase === 'hold') {
            state.phaseTime += dt;
            state.z = 0;
          }

          if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs > 0 && ts >= state.resultMeasureAtMs) {
            state.resultFace = resolveResultFace(state);
            if (state.resultFace > 0) {
              state.resultEmitted = true;
              const resultSides = Number((state.diceSpec && state.diceSpec.sides) || 6);
              console.log(`[dice-result] request=${state.requestId} sides=${resultSides} value=${state.resultFace}`);
            }
          }

          render(state);
          raf = requestAnimationFrame(frame);
        }

        raf = requestAnimationFrame(frame);
      };
    })();
  </script>
</body>
