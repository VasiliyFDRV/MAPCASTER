<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Physics Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      perspective: 1250px;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .dice-wrap {
      position: absolute;
      width: 88px;
      height: 88px;
      transform-style: preserve-3d;
      will-change: transform;
      opacity: 0;
    }

    .dice {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 50px;
      height: 50px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    .face {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 2px;
      border: none;
      box-sizing: border-box;
      background: #c8c8c8;
      color: #222222;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 18px;
      font-weight: 800;
      backface-visibility: hidden;
      box-shadow: none;
    }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%) translateZ(0.01px);
      border-radius: 2px;
      background: rgba(36, 36, 36, 0.88);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.08),
        inset 0 -2px 4px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .f1 { transform: rotateY(0deg) translateZ(25px); }
    .f2 { transform: rotateY(90deg) translateZ(25px); }
    .f3 { transform: rotateY(180deg) translateZ(25px); }
    .f4 { transform: rotateY(-90deg) translateZ(25px); }
    .f5 { transform: rotateX(90deg) translateZ(25px); }
    .f6 { transform: rotateX(-90deg) translateZ(25px); }


    .d8 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 68px;
      height: 68px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d8-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 41.57px;
      margin-left: -24px;
      margin-top: -27.71px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      transform-origin: 50% 66.666%;
    }

    .d8-core {
      display: none;
    }

    .d8-face.t1 { transform: rotateY(45deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t2 { transform: rotateY(135deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t3 { transform: rotateY(225deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t4 { transform: rotateY(315deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.b1 { transform: rotateY(45deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b2 { transform: rotateY(135deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b3 { transform: rotateY(225deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b4 { transform: rotateY(315deg) rotateX(35.264deg) translateZ(19.6px); }

    .shadow {
      position: absolute;
      width: 68px;
      height: 14px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.26);
      left: 0;
      top: 0;
      filter: blur(4px);
      will-change: transform, opacity;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="shadow" id="shadow-template" style="display:none;"></div>
    <div class="dice-wrap" id="wrap-template" style="display:none;">
      <div class="dice">
        <div class="core"></div>
        <div class="face f1">1</div>
        <div class="face f2">2</div>
        <div class="face f3">3</div>
        <div class="face f4">4</div>
        <div class="face f5">5</div>
        <div class="face f6">6</div>
      </div>
    </div>
    <div class="dice-wrap" id="wrap-d8-template" style="display:none;">
      <div class="dice">
        <div class="d8">
          <div class="d8-core"></div>
          <div class="d8-face t1">1</div>
          <div class="d8-face t2">2</div>
          <div class="d8-face t3">3</div>
          <div class="d8-face t4">4</div>
          <div class="d8-face b1">5</div>
          <div class="d8-face b2">6</div>
          <div class="d8-face b3">7</div>
          <div class="d8-face b4">8</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const scene = document.getElementById('scene');
      const wrapTemplate = document.getElementById('wrap-template');
      const wrapD8Template = document.getElementById('wrap-d8-template');
      const shadowTemplate = document.getElementById('shadow-template');

      let rollSeq = 0;
      const activeRollStates = new Map();

      const COLLISION_RESTITUTION = 0.14;
      const COLLISION_FRICTION = 0.06;
      const COLLISION_MAX_IMPULSE = 0.32;
      const COLLISION_MAX_SPEED = 0.45;
      const COLLISION_PUSH_FACTOR = 0.34;
      const COLLISION_PUSH_BIAS = 0.00;
      const COLLISION_CONTACT_DAMP = 0.985;
      const COLLISION_SLOP = 1.4;
      const COLLISION_MIN_NORMAL_SPEED = 0.02;
      const COLLISION_MAX_PUSH = 2.0;
      const COLLISION_REST_PENETRATION = 0.9;
      const COLLISION_REST_NORMAL_SPEED = 0.015;
      const COLLISION_GROUND_Z_GAP = 18;
      const COLLISION_GROUND_Z_MAX = 24;

      function apparentScale(state) {
        const zNorm = clamp(state.z / 260, 0, 1);
        return 0.78 + (1 - zNorm) * 0.22;
      }

      function collisionRadius(state) {
        return 36 * apparentScale(state);
      }

      function obbFromState(state) {
        const ang = Number(state.rz || 0) * Math.PI / 180;
        const ux = Math.cos(ang);
        const uy = Math.sin(ang);
        const vx = -uy;
        const vy = ux;
        const half = 25.5 * apparentScale(state);
        return {
          cx: Number(state.px || 0),
          cy: Number(state.py || 0),
          halfX: half,
          halfY: half,
          ux,
          uy,
          vx,
          vy
        };
      }

      function projectObbOnAxis(obb, ax, ay) {
        const c = obb.cx * ax + obb.cy * ay;
        const r =
          obb.halfX * Math.abs(obb.ux * ax + obb.uy * ay)
          + obb.halfY * Math.abs(obb.vx * ax + obb.vy * ay);
        return { min: c - r, max: c + r };
      }

      function satObbOverlap(a, b) {
        const axes = [
          [a.ux, a.uy],
          [a.vx, a.vy],
          [b.ux, b.uy],
          [b.vx, b.vy]
        ];

        let bestOverlap = 1e9;
        let bestAx = 0;
        let bestAy = 0;

        for (let i = 0; i < axes.length; i += 1) {
          let ax = axes[i][0];
          let ay = axes[i][1];
          const mag = Math.hypot(ax, ay);
          if (mag < 1e-6) continue;
          ax /= mag;
          ay /= mag;

          const pa = projectObbOnAxis(a, ax, ay);
          const pb = projectObbOnAxis(b, ax, ay);
          const overlap = Math.min(pa.max, pb.max) - Math.max(pa.min, pb.min);
          if (overlap <= 0) {
            return { collides: false, overlap: 0, nx: 0, ny: 0 };
          }
          if (overlap < bestOverlap) {
            bestOverlap = overlap;
            bestAx = ax;
            bestAy = ay;
          }
        }

        const dirX = b.cx - a.cx;
        const dirY = b.cy - a.cy;
        if (dirX * bestAx + dirY * bestAy < 0) {
          bestAx = -bestAx;
          bestAy = -bestAy;
        }

        return { collides: true, overlap: bestOverlap, nx: bestAx, ny: bestAy };
      }

      function pickSpawnX(centerX, w, py) {
        const minX = centerX - w * 0.10;
        const maxX = centerX + w * 0.10;

        let bestX = centerX;
        let bestScore = -1e9;
        for (let tries = 0; tries < 12; tries += 1) {
          const candidate = clamp(centerX + random(-w * 0.09, w * 0.09), minX, maxX);
          let minSep = 1e9;
          for (const other of activeRollStates.values()) {
            if (!other || other.phase === 'fade') {
              continue;
            }
            const dy = Math.abs(candidate - other.px);
            const pyDist = Math.abs(py - other.py);
            if (pyDist > 90) {
              continue;
            }
            minSep = Math.min(minSep, dy);
          }
          if (minSep > bestScore) {
            bestScore = minSep;
            bestX = candidate;
          }
          if (minSep > 64) {
            return candidate;
          }
        }

        return bestX;
      }

      function resolveDiceCollisions(state, bounds) {
        if (!state || state.phase === 'fade') {
          return;
        }

        for (const other of activeRollStates.values()) {
          if (!other || other === state || other.phase === 'fade') {
            continue;
          }
          if (Number(state.rollId || 0) >= Number(other.rollId || 0)) {
            continue;
          }

          if (Number(state.z || 0) > COLLISION_GROUND_Z_MAX || Number(other.z || 0) > COLLISION_GROUND_Z_MAX) {
            continue;
          }

          const zGap = Math.abs(Number(state.z || 0) - Number(other.z || 0));
          if (zGap > COLLISION_GROUND_Z_GAP) {
            continue;
          }

          const dx = state.px - other.px;
          const dy = state.py - other.py;
          const minDist = collisionRadius(state) + collisionRadius(other);
          const distSq = dx * dx + dy * dy;
          if (distSq >= minDist * minDist) {
            continue;
          }

          const obbA = obbFromState(state);
          const obbB = obbFromState(other);
          const sat = satObbOverlap(obbA, obbB);
          if (!sat.collides || sat.overlap <= COLLISION_SLOP) {
            continue;
          }

          const nx = sat.nx;
          const ny = sat.ny;
          const penetration = sat.overlap - COLLISION_SLOP;
          if (penetration <= 0) {
            continue;
          }

          const rvx = state.vx - other.vx;
          const rvy = state.vy - other.vy;
          const relNormal = rvx * nx + rvy * ny;
          if (penetration < COLLISION_REST_PENETRATION && Math.abs(relNormal) < COLLISION_REST_NORMAL_SPEED) {
            continue;
          }

          const push = Math.min(COLLISION_MAX_PUSH, penetration * COLLISION_PUSH_FACTOR + COLLISION_PUSH_BIAS);
          state.px -= nx * push * 0.5;
          state.py -= ny * push * 0.5;
          other.px += nx * push * 0.5;
          other.py += ny * push * 0.5;

          state.px = clamp(state.px, bounds.minX, bounds.maxX);
          state.py = clamp(state.py, bounds.minY, bounds.maxY);
          other.px = clamp(other.px, bounds.minX, bounds.maxX);
          other.py = clamp(other.py, bounds.minY, bounds.maxY);

          if (relNormal < -COLLISION_MIN_NORMAL_SPEED) {
            let impulse = -(1 + COLLISION_RESTITUTION) * relNormal * 0.5;
            impulse = clamp(impulse, 0, COLLISION_MAX_IMPULSE);
            state.vx += nx * impulse;
            state.vy += ny * impulse;
            other.vx -= nx * impulse;
            other.vy -= ny * impulse;
          }

          const tx = -ny;
          const ty = nx;
          const relTan = rvx * tx + rvy * ty;
          state.vx -= tx * relTan * COLLISION_FRICTION * 0.5;
          state.vy -= ty * relTan * COLLISION_FRICTION * 0.5;
          other.vx += tx * relTan * COLLISION_FRICTION * 0.5;
          other.vy += ty * relTan * COLLISION_FRICTION * 0.5;

          state.vx = clamp(state.vx * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
          state.vy = clamp(state.vy * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
          other.vx = clamp(other.vx * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
          other.vy = clamp(other.vy * COLLISION_CONTACT_DAMP, -COLLISION_MAX_SPEED, COLLISION_MAX_SPEED);
        }
      }

      function createRollNodes(kind) {
        if (!scene || !wrapTemplate || !shadowTemplate) {
          return null;
        }

        const shadow = shadowTemplate.cloneNode(true);
        shadow.removeAttribute('id');
        shadow.style.display = 'block';

        const sourceWrap = kind === "d8" && wrapD8Template ? wrapD8Template : wrapTemplate;
        const wrap = sourceWrap.cloneNode(true);
        wrap.removeAttribute('id');
        wrap.style.display = 'block';

        const dice = wrap.querySelector('.dice');
        if (!dice) {
          return null;
        }

        const faceEls = Array.from(dice.querySelectorAll(kind === 'd8' ? '.d8-face' : '.face'));
        const coreEl = dice.querySelector(kind === 'd8' ? '.d8-core' : '.core');

        scene.appendChild(shadow);
        scene.appendChild(wrap);
        return { wrap, dice, shadow, faceEls, coreEl };
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function jitter(base, spread) {
        return base * (1 + random(-spread, spread));
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function clampSpinToFloor(current, floorAbs) {
        const sign = current < 0 ? -1 : 1;
        return sign * Math.max(Math.abs(current), floorAbs);
      }
      function normalizeAngle(deg) {
        let a = deg % 360;
        if (a > 180) a -= 360;
        if (a < -180) a += 360;
        return a;
      }

      function lerpAngle(a, b, t) {
        const delta = normalizeAngle(b - a);
        return a + delta * t;
      }

      function angularDistance(a, b) {
        return Math.abs(normalizeAngle(a - b));
      }

      function rotateVec(v, rx, ry, rz) {
        const x0 = v.x;
        const y0 = v.y;
        const z0 = v.z;

        // CSS applies right-most transform first.
        // For `rotateZ(...) rotateY(...) rotateX(...)` the effective order is X -> Y -> Z.
        const ax = rx * Math.PI / 180;
        const cx = Math.cos(ax);
        const sx = Math.sin(ax);
        const x1 = x0;
        const y1 = y0 * cx - z0 * sx;
        const z1 = y0 * sx + z0 * cx;

        const ay = ry * Math.PI / 180;
        const cy = Math.cos(ay);
        const sy = Math.sin(ay);
        const x2 = x1 * cy + z1 * sy;
        const y2 = y1;
        const z2 = -x1 * sy + z1 * cy;

        const az = rz * Math.PI / 180;
        const cz = Math.cos(az);
        const sz = Math.sin(az);
        const x3 = x2 * cz - y2 * sz;
        const y3 = x2 * sz + y2 * cz;
        const z3 = z2;

        return { x: x3, y: y3, z: z3 };
      }

      const FACE_NORMALS = [
        { x: 0, y: 0, z: 1 },
        { x: 1, y: 0, z: 0 },
        { x: 0, y: 0, z: -1 },
        { x: -1, y: 0, z: 0 },
        { x: 0, y: -1, z: 0 },
        { x: 0, y: 1, z: 0 }
      ];

      const D8_FACE_NORMALS = [
        { x: 1, y: 1, z: 1 },
        { x: -1, y: 1, z: 1 },
        { x: -1, y: -1, z: 1 },
        { x: 1, y: -1, z: 1 },
        { x: 1, y: 1, z: -1 },
        { x: -1, y: 1, z: -1 },
        { x: -1, y: -1, z: -1 },
        { x: 1, y: -1, z: -1 }
      ];

      function normalizeVec3(x, y, z) {
        const m = Math.hypot(x, y, z) || 1;
        return { x: x / m, y: y / m, z: z / m };
      }

      function applyLighting(state) {
        if (!state || !state.faceEls || state.faceEls.length !== 6) {
          return;
        }

        const lightX = window.innerWidth * 0.5;
        const lightY = window.innerHeight * 0.28;
        const lightZ = 360;

        const l = normalizeVec3(lightX - state.px, lightY - state.py, lightZ - state.z);
        const v = { x: 0, y: 0, z: 1 };

        const normals = state.faceEls.length === 8 ? D8_FACE_NORMALS : FACE_NORMALS;
        for (let i = 0; i < state.faceEls.length; i += 1) {
          const face = state.faceEls[i];
          const nLocal = normals[i % normals.length];
          const nWorld = rotateVec(nLocal, state.rx, state.ry, state.rz);
          const n = normalizeVec3(nWorld.x, nWorld.y, nWorld.z);

          const ndotl = Math.max(0, n.x * l.x + n.y * l.y + n.z * l.z);
          const ambient = 0.34;
          const diffuse = ambient + ndotl * 0.84;

          const rx = 2 * ndotl * n.x - l.x;
          const ry = 2 * ndotl * n.y - l.y;
          const rz = 2 * ndotl * n.z - l.z;
          const spec = Math.pow(Math.max(0, rx * v.x + ry * v.y + rz * v.z), 18);

          const bright = clamp(diffuse, 0.28, 1.24);
          face.style.filter = `brightness(${bright.toFixed(3)}) contrast(1.03)`;
          const rimLight = (0.012 + spec * 0.09).toFixed(3);
          const rimDark = (0.022 + (1 - ndotl) * 0.06).toFixed(3);
          face.style.boxShadow = `inset 0 0 0 0.8px rgba(255,255,255,${rimLight}), inset 0 0 0 2px rgba(0,0,0,${rimDark}), inset 0 0 0 999px rgba(0,0,0,${(0.016 + (1 - ndotl) * 0.05).toFixed(3)})`;
        }

        if (state.coreEl) {
          const darkness = clamp(0.62 + (1 - Math.max(0, l.z)) * 0.25, 0.58, 0.86);
          state.coreEl.style.backgroundColor = `rgba(36, 36, 36, ${darkness.toFixed(3)})`;
        }
      }

      function screenFacingFaceId(rx, ry) {
        const faces = [
          { id: 1, n: { x: 0, y: 0, z: 1 } },
          { id: 2, n: { x: 1, y: 0, z: 0 } },
          { id: 3, n: { x: 0, y: 0, z: -1 } },
          { id: 4, n: { x: -1, y: 0, z: 0 } },
          { id: 5, n: { x: 0, y: -1, z: 0 } },
          { id: 6, n: { x: 0, y: 1, z: 0 } }
        ];

        let bestId = faces[0].id;
        let bestDepth = -1e9;
        for (let i = 0; i < faces.length; i += 1) {
          // For table=screen plane we decide target face only by rx/ry.
          const w = rotateVec(faces[i].n, rx, ry, 0);
          if (w.z > bestDepth) {
            bestDepth = w.z;
            bestId = faces[i].id;
          }
        }
        return bestId;
      }


      function topFaceFromEuler(rx, ry, rz) {
        const faces = [
          { id: 1, n: { x: 0, y: 0, z: 1 } },
          { id: 2, n: { x: 1, y: 0, z: 0 } },
          { id: 3, n: { x: 0, y: 0, z: -1 } },
          { id: 4, n: { x: -1, y: 0, z: 0 } },
          { id: 5, n: { x: 0, y: -1, z: 0 } },
          { id: 6, n: { x: 0, y: 1, z: 0 } }
        ];

        let bestId = faces[0].id;
        let bestDepth = -1e9;
        for (let i = 0; i < faces.length; i += 1) {
          const w = rotateVec(faces[i].n, rx, ry, rz);
          if (w.z > bestDepth) {
            bestDepth = w.z;
            bestId = faces[i].id;
          }
        }
        return bestId;
      }

      function faceUpTargetFromPose(rx, ry) {
        const targetFace = screenFacingFaceId(rx, ry);
        const angles = [0, 90, 180, -90];
        let best = null;
        let bestDist = Number.POSITIVE_INFINITY;

        for (let ix = 0; ix < angles.length; ix += 1) {
          for (let iy = 0; iy < angles.length; iy += 1) {
            const c = { rx: angles[ix], ry: angles[iy] };
            const face = screenFacingFaceId(c.rx, c.ry);
            if (face !== targetFace) {
              continue;
            }
            const d = angularDistance(rx, c.rx) + angularDistance(ry, c.ry);
            if (d < bestDist) {
              bestDist = d;
              best = c;
            }
          }
        }

        if (!best) {
          return { face: targetFace, target: { rx: rx, ry: ry } };
        }

        return { face: targetFace, target: { rx: best.rx, ry: best.ry } };
      }

      function render(state) {
        const zNorm = clamp(state.z / 260, 0, 1);
        const cx = state.px;
        const cy = state.py - state.z * 0.55;
        const scale = 0.78 + (1 - zNorm) * 0.22;

        state.wrap.style.opacity = String(clamp(state.alpha, 0, 1));
        state.wrap.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%) scale(${scale})`;
        state.dice.style.transform =
          `translate(-50%, -50%) rotateZ(${state.rz}deg) rotateY(${state.ry}deg) rotateX(${state.rx}deg)`;

        const shadowScale = 0.78 + (1 - zNorm) * 0.26;
        const shadowOpacity = clamp((1 - zNorm) * 0.38, 0, 0.36) * state.alpha;
        state.shadow.style.opacity = String(shadowOpacity);
        state.shadow.style.transform = `translate(${state.px}px, ${state.py + 28}px) translate(-50%, -50%) scale(${shadowScale})`;

        applyLighting(state);
      }

      window.clearAllDice = function clearAllDice() {
        const states = Array.from(activeRollStates.values());
        for (let i = 0; i < states.length; i += 1) {
          const s = states[i];
          if (s && typeof s.cleanup === "function") {
            s.cleanup();
          }
        }
      };
      window.startD8Roll = function startD8Roll() {
        window.startD6Roll(0, "d8");
      };

      window.startD6Roll = function startD6Roll(requestId, kind) {
        const modelKind = String(kind || "d6");
        const nodes = createRollNodes(modelKind);
        if (!nodes) {
          return;
        }

        const w = window.innerWidth;
        const h = window.innerHeight;
        const centerX = w * 0.5;

        const rollId = ++rollSeq;

        const throwPower = random(0.72, 1.35);
        const spinPower = random(0.95, 1.90);
        const driftPower = random(0.95, 1.75);
        const spawnPy = h * random(0.10, 0.19);
        const spawnPx = pickSpawnX(centerX, w, spawnPy);

        const state = {
          px: spawnPx,
          py: spawnPy,
          vx: random(-3.2, 3.2) * driftPower,
          vy: random(1.4, 5.4) * throwPower,

          z: random(190, 280),
          vz: random(20, 95) * throwPower,

          rx: random(0, 360),
          ry: random(0, 360),
          rz: random(0, 360),
          vrx: random(124, 428) * spinPower,
          vry: random(145, 483) * spinPower,
          vrz: random(76, 290) * spinPower,
          baseVrx: 0,
          baseVry: 0,
          baseVrz: 0,
          airTime: 0,

          bounces: 0,
          settledFor: 0,
          alpha: 1,
          phase: 'rolling',
          phaseTime: 0,
          alignTarget: null,
          alignReady: false,
          groundedFor: 0,
          alignStarted: false,
          alignStartRz: 0,
          alignMaxRzDelta: 0,
          alignFrames: 0,
          alignElapsed: 0,
          landingBlend: 0,
          landingProfile: random(0, 1),
          requestId: Number(requestId || 0),
          resultFace: 0,
          resultEmitted: false,
          resultMeasureAtMs: 0,
          rollId: rollId,
          wrap: nodes.wrap,
          dice: nodes.dice,
          shadow: nodes.shadow,
          faceEls: nodes.faceEls || [],
          coreEl: nodes.coreEl || null
        };

        state.baseVrx = Math.abs(state.vrx);
        state.baseVry = Math.abs(state.vry);
        state.baseVrz = Math.abs(state.vrz);
        activeRollStates.set(rollId, state);

                let raf = 0;
        function stopRoll() {
          if (raf) {
            cancelAnimationFrame(raf);
            raf = 0;
          }
          activeRollStates.delete(rollId);
          if (state.wrap && state.wrap.parentNode) {
            state.wrap.parentNode.removeChild(state.wrap);
          }
          if (state.shadow && state.shadow.parentNode) {
            state.shadow.parentNode.removeChild(state.shadow);
          }
        }

        state.cleanup = stopRoll;

        const gravity = jitter(1850, 0.11);
        const restitution = clamp(jitter(0.2, 0.2), 0.12, 0.34);
        const dampVx = jitter(0.988, 0.01);
        const dampVy = jitter(0.996, 0.006);
        const dampRot = jitter(0.986, 0.007);
        const alignStartGroundedDelay = random(0.03, 0.18);
        const alignSpeedBoost = random(1.6, 2.4);
        const alignPlopBoost = random(1.3, 2.0);
        const alignForceSnapDelay = random(0.28, 0.62);
        const resultMeasureDelayMs = 0;
        const landingBlendInSec = random(0.07, 0.22);
        const landingBlendOutSec = random(0.05, 0.10);

        let lastTs = performance.now();

        render(state);

        function frame(ts) {
          const dt = Math.min(0.033, (ts - lastTs) / 1000);
          lastTs = ts;

          if (state.phase === 'rolling') {
            state.px += state.vx * 62 * dt;
            state.py += state.vy * 62 * dt;

            state.vz += gravity * dt;
            state.z -= state.vz * dt;

            state.rx += state.vrx * dt;
            state.ry += state.vry * dt;
            state.rz += state.vrz * dt;

                        state.vx *= dampVx;
            state.vy *= dampVy;
            state.vrx *= dampRot;
            state.vry *= dampRot;
            state.vrz *= dampRot;

            if (state.z > 0) {
              state.airTime += dt;
              const fade = clamp(state.airTime / 0.95, 0, 1);
              const floorScale = 1 - 0.5 * fade; // 100% -> 50% of initial spin in air
              state.vrx = clampSpinToFloor(state.vrx, state.baseVrx * floorScale);
              state.vry = clampSpinToFloor(state.vry, state.baseVry * floorScale);
              state.vrz = clampSpinToFloor(state.vrz, state.baseVrz * floorScale);
            }

            if (state.z <= 0) {
              state.z = 0;
              const softness = state.landingProfile;
              const bounceThreshold = random(54, 84) * (1 - softness * 0.10);
              const bounceRestitution = restitution * (1 - softness * 0.18);

              if (Math.abs(state.vz) > bounceThreshold && state.bounces < (Math.random() < 0.45 ? 3 : 2)) {
                state.vz = -Math.abs(state.vz) * bounceRestitution;
                state.vx += random(-0.65, 0.65) * driftPower;
                state.vy += random(-0.16, 0.12) * driftPower;
                state.vrx += random(-22, 22) * spinPower;
                state.vry += random(-24, 24) * spinPower;
                state.vrz += random(-16, 16) * spinPower;
                state.bounces += 1;
              } else {
                state.vz = 0;
              }

              const groundMix = clamp(state.landingBlend, 0, 1);
              const vxTarget = (0.86 * (1 - softness)) + (0.93 * softness);
              const vyTarget = (0.90 * (1 - softness)) + (0.95 * softness);
              const vrxTarget = (0.75 * (1 - softness)) + (0.86 * softness);
              const vryTarget = (0.75 * (1 - softness)) + (0.86 * softness);
              const vrzTarget = (0.75 * (1 - softness)) + (0.84 * softness);

              const vxBlendDamp = 1 - (1 - vxTarget) * groundMix;
              const vyBlendDamp = 1 - (1 - vyTarget) * groundMix;
              const vrxBlendDamp = 1 - (1 - vrxTarget) * groundMix;
              const vryBlendDamp = 1 - (1 - vryTarget) * groundMix;
              const vrzBlendDamp = 1 - (1 - vrzTarget) * groundMix;

              state.vx *= vxBlendDamp;
              state.vy *= vyBlendDamp;
              state.vrx *= vrxBlendDamp;
              state.vry *= vryBlendDamp;
              state.vrz *= vrzBlendDamp;
            }

            const groundedNow = state.z === 0 && Math.abs(state.vz) < 1e-4;
            if (groundedNow) {
              state.landingBlend = clamp(state.landingBlend + dt / landingBlendInSec, 0, 1);
            } else {
              state.landingBlend = clamp(state.landingBlend - dt / landingBlendOutSec, 0, 1);
            }

            state.px = clamp(state.px, centerX - w * 0.15, centerX + w * 0.15);
            state.py = clamp(state.py, h * 0.22, h * 0.62);

            resolveDiceCollisions(state, {
              minX: centerX - w * 0.15,
              maxX: centerX + w * 0.15,
              minY: h * 0.22,
              maxY: h * 0.62
            });

            const planarSpeed = Math.abs(state.vx) + Math.abs(state.vy);
            const spin = Math.abs(state.vrx) + Math.abs(state.vry) + Math.abs(state.vrz);
            const alignSpin = Math.abs(state.vrx) + Math.abs(state.vry);
            const grounded = state.z === 0 && Math.abs(state.vz) < 1e-4;
            if (grounded) {
              state.groundedFor += dt;
            } else {
              state.groundedFor = 0;
            }

            // Continuous stabilization with locked target to avoid jitter.
            if (grounded && state.groundedFor >= alignStartGroundedDelay && planarSpeed < 1.05 && alignSpin < 180 && !state.alignReady) {
              if (!state.alignTarget) {
                const facePick = faceUpTargetFromPose(state.rx, state.ry);
                state.alignTarget = facePick.target;
                state.resultFace = Number(facePick.face || 0);
                state.alignReady = false;
                state.alignStarted = true;
                state.alignStartRz = state.rz;
                state.vrz = 0;
                state.alignMaxRzDelta = 0;
                state.alignFrames = 0;
                state.alignElapsed = 0;
                console.log("[dice-debug] roll=" + rollId + " align-start rx=" + state.rx.toFixed(2) + " ry=" + state.ry.toFixed(2) + " rz=" + state.rz.toFixed(2) + " tx=" + state.alignTarget.rx.toFixed(2) + " ty=" + state.alignTarget.ry.toFixed(2));
              }

              const target = state.alignTarget;
              state.alignFrames += 1;
              const rzDelta = Math.abs(normalizeAngle(state.rz - state.alignStartRz));
              if (rzDelta > state.alignMaxRzDelta) {
                state.alignMaxRzDelta = rzDelta;
              }
              const alignDistance = angularDistance(state.rx, target.rx)
                + angularDistance(state.ry, target.ry);
              const closeness = clamp(1 - alignDistance / 180, 0, 1);
              const settleGate = clamp((1.18 - planarSpeed) / 1.18, 0, 1) * clamp((210 - alignSpin) / 210, 0, 1);

              const slowZone = clamp((0.58 - planarSpeed) / 0.58, 0, 1);
              const plopBoost = slowZone * slowZone * (0.24 + closeness * 0.56) * alignPlopBoost;
              const baseAssist = (0.014 + closeness * 0.11) * settleGate * alignSpeedBoost;
              const assist = baseAssist + plopBoost;

              const t = clamp(assist * dt * 60, 0, 2.2);
              state.rx = lerpAngle(state.rx, target.rx, t);
              state.ry = lerpAngle(state.ry, target.ry, t * 0.92);
              state.rz = state.alignStartRz;

              // Kill shaking once close to stable face-up orientation.
              const forceSnap = state.groundedFor > alignForceSnapDelay && alignDistance < 12.0;
              if (alignDistance < 3.2 || forceSnap) {
                state.rx = target.rx;
                state.ry = target.ry;
                state.rz = state.alignStartRz;
                
                state.vrx = 0;
                state.vry = 0;
                state.vrz = 0;
                state.alignReady = true;
                if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs <= 0) {
                  state.resultMeasureAtMs = ts + resultMeasureDelayMs;
                }
                console.log(`[dice-debug] roll=${rollId} align-end reason=${forceSnap ? "force" : "normal"} ad=${alignDistance.toFixed(3)} rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} frames=${state.alignFrames}`);
              } else {
                state.vrx *= 0.66;
                state.vry *= 0.72;
                state.vrz *= 0.66;
              }
            } else if (!grounded) {
              if (state.alignStarted && !state.alignReady) {
                console.log(`[dice-debug] roll=${rollId} align-abort rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} frames=${state.alignFrames}`);
              }
              state.alignTarget = null;
              state.alignReady = false;
              state.alignStarted = false;
              state.alignElapsed = 0;
            }


            const resting = grounded && planarSpeed < 0.025 && alignSpin < 2.4 && state.alignReady;
            if (resting) {
              state.settledFor += dt;
            } else {
              state.settledFor = 0;
            }

            if (state.settledFor > 0.34) {
              console.log(`[dice-debug] roll=${rollId} hold-enter rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} alignReady=${state.alignReady}`);
              if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs <= 0) {
                state.resultMeasureAtMs = ts + resultMeasureDelayMs;
              }
              state.vx = 0;
              state.vy = 0;
              state.vz = 0;
              state.vrx = 0;
              state.vry = 0;
              state.vrz = 0;
              state.phase = 'hold';
              state.phaseTime = 0;
            }
          } else if (state.phase === 'hold') {
            state.phaseTime += dt;
            state.z = 0;
          }

          if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs > 0 && ts >= state.resultMeasureAtMs) {
            state.resultFace = Number(screenFacingFaceId(state.rx, state.ry) || 0);
            if (state.resultFace > 0) {
              state.resultEmitted = true;
              console.log(`[dice-result] request=${state.requestId} value=${state.resultFace}`);
            }
          }

          render(state);
          raf = requestAnimationFrame(frame);
        }

        raf = requestAnimationFrame(frame);
      };
    })();
  </script>
</body>
</html>
