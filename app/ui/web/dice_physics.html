<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Physics Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      perspective: 1250px;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .dice-wrap {
      position: absolute;
      width: 88px;
      height: 88px;
      transform-style: preserve-3d;
      will-change: transform;
      opacity: 0;
    }

    .dice {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38px;
      height: 38px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    .face {
      position: absolute;
      width: 38px;
      height: 38px;
      border-radius: 2px;
      border: none;
      box-sizing: border-box;
      background: #c8c8c8;
      color: #222222;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      font-weight: 800;
      backface-visibility: hidden;
      box-shadow: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      isolation: isolate;
    }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 25px;
      height: 25px;
      transform: translate(-50%, -50%) translateZ(0.01px);
      border-radius: 2px;
      background: rgba(36, 36, 36, 0.88);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.08),
        inset 0 -2px 4px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .f1 { transform: rotateY(0deg) translateZ(19px); }
    .f2 { transform: rotateY(90deg) translateZ(19px); }
    .f3 { transform: rotateY(180deg) translateZ(19px); }
    .f4 { transform: rotateY(-90deg) translateZ(19px); }
    .f5 { transform: rotateX(90deg) translateZ(19px); }
    .f6 { transform: rotateX(-90deg) translateZ(19px); }


    .d8 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 68px;
      height: 68px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d8-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 41.57px;
      margin-left: -24px;
      margin-top: -27.71px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding-top: 8px;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 66.666%;
      overflow: hidden;
      isolation: isolate;
    }

    .d8-core {
      display: none;
    }

    .d8-face.t1 { transform: rotateY(45deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t2 { transform: rotateY(135deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t3 { transform: rotateY(225deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.t4 { transform: rotateY(315deg) rotateX(-35.264deg) rotateZ(180deg) translateZ(19.6px); }
    .d8-face.b1 { transform: rotateY(45deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b2 { transform: rotateY(135deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b3 { transform: rotateY(225deg) rotateX(35.264deg) translateZ(19.6px); }
    .d8-face.b4 { transform: rotateY(315deg) rotateX(35.264deg) translateZ(19.6px); }
    .d4 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 74px;
      height: 74px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d4-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      margin-left: -12px;
      margin-top: -12px;
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
      overflow: hidden;
      isolation: isolate;
    }

    .d4-core {
      display: none;
    }

    .d4-label {
      position: absolute;
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      display: inline-block;
      text-align: center;
      font-variant-numeric: tabular-nums;
      z-index: 3;
    }

    .d10 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 88px;
      height: 88px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d10-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44px;
      height: 50.806px;
      margin-left: -22px;
      margin-top: -25.403px;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: block;
      line-height: 1;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
      border: none;
      overflow: hidden;
      isolation: isolate;
    }

    .d10-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      z-index: 3;
    }

    .d10t-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      z-index: 3;
    }

    .d10-mark {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, 0);
      font-size: 0.82em;
      line-height: 1;
      color: #232323;
      opacity: 1;
      pointer-events: none;
      z-index: 3;
    }

    .d12-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      display: inline-block;
      text-align: center;
      font-variant-numeric: tabular-nums;
      z-index: 3;
    }

    .d20-label {
      position: absolute;
      line-height: 1;
      transform-origin: 50% 50%;
      pointer-events: none;
      white-space: nowrap;
      display: inline-block;
      text-align: center;
      font-variant-numeric: tabular-nums;
      z-index: 3;
    }

    .d12-mark {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, 0);
      font-size: 0.82em;
      line-height: 1;
      color: #232323;
      opacity: 1;
      pointer-events: none;
      z-index: 3;
    }

    .d10-core {
      display: none;
    }

    .d12 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 92px;
      height: 92px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d12-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 33.4px;
      height: 33.4px;
      margin-left: -16.7px;
      margin-top: -16.7px;
      clip-path: polygon(50% 0%, 97.5528258% 34.5491503%, 79.3892626% 90.4508497%, 20.6107374% 90.4508497%, 2.4471742% 34.5491503%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
      overflow: hidden;
      isolation: isolate;
    }

    .d12-core {
      display: none;
    }

    .d20 {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 96px;
      height: 96px;
      transform: translate(-50%, -50%);
      transform-style: preserve-3d;
    }

    .d20-face {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 29.4449px;
      margin-left: -17px;
      margin-top: -14.72245px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      background: #c9c9c9;
      color: #232323;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1;
      padding-top: 0;
      box-sizing: border-box;
      backface-visibility: hidden;
      transform-origin: 50% 50%;
      overflow: hidden;
      isolation: isolate;
      transition: box-shadow 180ms ease;
    }

    .d20-core {
      display: none;
    }
    
    .face-edge-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }

    .face-edge-overlay polygon {
      fill: none;
      stroke: transparent;
      stroke-width: 0;
      vector-effect: non-scaling-stroke;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .d20-face::before {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      z-index: 1;
      transform: scale(1);
      opacity: 0.16;
      background: radial-gradient(circle at 50% 60%, rgba(236, 236, 236, 0.82) 0%, rgba(222, 222, 222, 0.42) 40%, rgba(206, 206, 206, 0.10) 72%, rgba(206, 206, 206, 0) 90%);
    }

    .d20-face::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      background: transparent;
      border: 0;
    }

    .d20-label {
      transition: color 180ms ease, text-shadow 180ms ease;
      z-index: 3;
      color: #1f1f1f;
      text-shadow:
        0 0 6px rgba(238, 238, 238, 0.70),
        0 0 10px rgba(246, 246, 246, 0.52),
        0 0 14px rgba(248, 248, 248, 0.34);
    }

    .face,
    .d4-face,
    .d8-face,
    .d10-face,
    .d12-face {
      box-shadow:
        inset 0 0 0 1px rgba(212, 212, 212, 0.34),
        inset 0 0 9px rgba(220, 220, 220, 0.14),
        0 0 7px rgba(226, 226, 226, 0.12);
      color: #1f1f1f;
    }

    .face,
    .d8-face,
    .d10-face,
    .d12-face,
    .d4-label,
    .d10-label,
    .d10t-label,
    .d12-label {
      text-shadow:
        0 0 6px rgba(238, 238, 238, 0.70),
        0 0 10px rgba(246, 246, 246, 0.52),
        0 0 14px rgba(248, 248, 248, 0.34);
      color: #1f1f1f;
    }

    .d20-face.d20-crit-success-face .d20-label {
      color: #ffffcc;
      text-shadow:
        0 0 2px rgba(154, 90, 16, 0.95),
        0 0 6px rgba(255, 255, 204, 0.74),
        0 0 11px rgba(255, 255, 153, 0.58);
      -webkit-text-stroke: 1px #6e4210;
      paint-order: stroke fill;
      animation: none;
      transition: none;
    }

    .d20-face.d20-crit-fail-face .d20-label {
      color: #ffb5b5;
      text-shadow:
        0 0 2px rgba(123, 28, 28, 0.95),
        0 0 6px rgba(255, 181, 181, 0.72),
        0 0 10px rgba(214, 78, 78, 0.52);
      -webkit-text-stroke: 1px #5a1f1f;
      paint-order: stroke fill;
      animation: none;
      transition: none;
    }

    .dice-wrap.d20-picked-adv .d20-face {
      box-shadow:
        inset 0 0 0 1.2px rgba(56, 170, 96, 0.98),
        inset 0 0 12px rgba(45, 148, 84, 0.24),
        0 0 10px rgba(56, 170, 96, 0.28);
    }

    .dice-wrap.d20-picked-adv .d20-label {
      color: #2f8b4b;
      text-shadow: 0 0 5px rgba(47, 139, 75, 0.40);
    }

    .dice-wrap.d20-picked-dis .d20-face {
      box-shadow:
        inset 0 0 0 1.2px rgba(156, 47, 47, 0.98),
        inset 0 0 12px rgba(130, 34, 34, 0.24),
        0 0 10px rgba(156, 47, 47, 0.28);
    }

    .dice-wrap.d20-picked-dis .d20-label {
      color: #a33c3c;
      text-shadow: 0 0 5px rgba(163, 60, 60, 0.40);
    }
    .shadow {
      position: absolute;
      width: 68px;
      height: 14px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.26);
      left: 0;
      top: 0;
      filter: blur(4px);
      will-change: transform, opacity;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="shadow" id="shadow-template" style="display:none;"></div>
    <div class="dice-wrap" id="wrap-template" style="display:none;">
      <div class="dice">
        <div class="core"></div>
        <div class="face f1">1</div>
        <div class="face f2">2</div>
        <div class="face f3">3</div>
        <div class="face f4">4</div>
        <div class="face f5">5</div>
        <div class="face f6">6</div>
      </div>
    </div>
    <div class="dice-wrap" id="wrap-d8-template" style="display:none;">
      <div class="dice">
        <div class="d8">
          <div class="d8-core"></div>
          <div class="d8-face t1">1</div>
          <div class="d8-face t2">2</div>
          <div class="d8-face t3">3</div>
          <div class="d8-face t4">4</div>
          <div class="d8-face b1">5</div>
          <div class="d8-face b2">6</div>
          <div class="d8-face b3">7</div>
          <div class="d8-face b4">8</div>
        </div>
      </div>
    </div>
    <div class="dice-wrap" id="wrap-d4-template" style="display:none;">
      <div class="dice">
        <div class="d4">
          <div class="d4-core"></div>
          <div class="d4-face f1"></div>
          <div class="d4-face f2"></div>
          <div class="d4-face f3"></div>
          <div class="d4-face f4"></div>
          <div class="d4-face f5"></div>
          <div class="d4-face f6"></div>
          <div class="d4-face f7"></div>
          <div class="d4-face f8"></div>
        </div>
      </div>
    </div>
    <div class="dice-wrap" id="wrap-d10-template" style="display:none;">
      <div class="dice">
        <div class="d10">
          <div class="d10-core"></div>
          <div class="d10-face f1">1</div>
          <div class="d10-face f2">2</div>
          <div class="d10-face f3">3</div>
          <div class="d10-face f4">4</div>
          <div class="d10-face f5">5</div>
          <div class="d10-face f6">6</div>
          <div class="d10-face f7">7</div>
          <div class="d10-face f8">8</div>
          <div class="d10-face f9">9</div>
          <div class="d10-face f10">10</div>
        </div>
      </div>
    </div>
    <div class="dice-wrap" id="wrap-d12-template" style="display:none;">
      <div class="dice">
        <div class="d12">
          <div class="d12-core"></div>
          <div class="d12-face f1">1</div>
          <div class="d12-face f2">2</div>
          <div class="d12-face f3">3</div>
          <div class="d12-face f4">4</div>
          <div class="d12-face f5">5</div>
          <div class="d12-face f6">6</div>
          <div class="d12-face f7">7</div>
          <div class="d12-face f8">8</div>
          <div class="d12-face f9">9</div>
          <div class="d12-face f10">10</div>
          <div class="d12-face f11">11</div>
          <div class="d12-face f12">12</div>
        </div>
      </div>
    </div>
    <div class="dice-wrap" id="wrap-d20-template" style="display:none;">
      <div class="dice">
        <div class="d20">
          <div class="d20-core"></div>
          <div class="d20-face f1">1</div>
          <div class="d20-face f2">2</div>
          <div class="d20-face f3">3</div>
          <div class="d20-face f4">4</div>
          <div class="d20-face f5">5</div>
          <div class="d20-face f6">6</div>
          <div class="d20-face f7">7</div>
          <div class="d20-face f8">8</div>
          <div class="d20-face f9">9</div>
          <div class="d20-face f10">10</div>
          <div class="d20-face f11">11</div>
          <div class="d20-face f12">12</div>
          <div class="d20-face f13">13</div>
          <div class="d20-face f14">14</div>
          <div class="d20-face f15">15</div>
          <div class="d20-face f16">16</div>
          <div class="d20-face f17">17</div>
          <div class="d20-face f18">18</div>
          <div class="d20-face f19">19</div>
          <div class="d20-face f20">20</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const scene = document.getElementById('scene');
      const wrapTemplate = document.getElementById('wrap-template');
      const wrapD8Template = document.getElementById('wrap-d8-template');
      const wrapD4Template = document.getElementById('wrap-d4-template');
      const wrapD10Template = document.getElementById('wrap-d10-template');
      const wrapD12Template = document.getElementById('wrap-d12-template');
      const wrapD20Template = document.getElementById('wrap-d20-template');

      // Fixed per-face label correction for d10 (degrees).
      // Keeping this in one table avoids side effects when tuning individual faces.
      const D10_LABEL_ROTATE_OFFSETS = {
        1: 0,
        2: 180,
        3: 180,
        4: 180,
        5: 0,
        6: 180,
        7: 180,
        8: 0,
        9: 0,
        10: 180,
      };
      const shadowTemplate = document.getElementById('shadow-template');

      let rollSeq = 0;
      const activeRollStates = new Map();
      const d20RequestMeta = new Map();
      let previewDieKind = "d6";
      let previewStaticMode = false;
      let previewPresentationMode = "roll";
      let previewRenderVariant = "default";
      const canonicalPreviewPoseCache = new Map();
      let styleOverrides = {
        scalePercent: 100,
        faceColor: "#c9c9c9",
        gradientEnabled: false,
        gradientCenterColor: "#ffffff",
        gradientSharpness: 0.5,
        gradientOffset: 0.5,
        textColor: "#1f1f1f",
        textStrokeColor: "#eeeeee",
          textShadowIntensity: 1.0,
          textGlowRadius: 1.0,
          textGlowOpacity: 1.0,
          edgeColor: "#d4d4d4",
          edgeWidth: 0.0,
      };

      const MAIN_PREVIEW_PRESETS = {
        d4: { modelKind: 'd4', fitScale: 0.96, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04 },
        d6: { modelKind: 'd6', fitScale: 0.98, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04 },
        d8: { modelKind: 'd8', fitScale: 0.98, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04 },
        d10: { modelKind: 'd10', fitScale: 0.94, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04 },
        d10t: { modelKind: 'd10t', fitScale: 0.94, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04, rzOffset: 180 },
        d12: { modelKind: 'd12', fitScale: 0.90, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04, poseRollOffset: 180 },
        d20: { modelKind: 'd20', fitScale: 0.96, offsetX: 0, offsetY: 2, idleScaleBoost: 1.04, rx: -58, ry: 34, rz: 14 },
        d100: { modelKind: 'd10t', fitScale: 0.94, offsetX: 0, offsetY: 1, idleScaleBoost: 1.04, copyPoseFrom: 'd10' },
      };

      const COLLISION_RESTITUTION = 0.14;
      const COLLISION_FRICTION = 0.06;
      const COLLISION_MAX_IMPULSE = 0.32;
      const COLLISION_MAX_SPEED = 0.45;
      const COLLISION_PUSH_FACTOR = 0.34;
      const COLLISION_PUSH_BIAS = 0.00;
      const COLLISION_CONTACT_DAMP = 0.985;
      const COLLISION_SLOP = 1.4;
      const COLLISION_MIN_NORMAL_SPEED = 0.02;
      const COLLISION_MAX_PUSH = 2.0;
      const COLLISION_REST_PENETRATION = 0.9;
      const COLLISION_REST_NORMAL_SPEED = 0.015;
      const COLLISION_GROUND_Z_GAP = 18;
      const COLLISION_GROUND_Z_MAX = 24;

      function getD20RequestMode(requestId) {
        const reqId = Number(requestId || 0);
        if (reqId <= 0) {
          return 'normal';
        }
        const mode = String(d20RequestMeta.get(reqId) || 'normal');
        if (mode === 'advantage' || mode === 'disadvantage') {
          return mode;
        }
        return 'normal';
      }

      function applyD20PairOutcomeVisuals(requestId) {
        const reqId = Number(requestId || 0);
        if (reqId <= 0) {
          return;
        }
        const mode = getD20RequestMode(reqId);
        const d20States = Array.from(activeRollStates.values())
          .filter((s) => s && String(s.modelKind || '') === 'd20' && Number(s.requestId || 0) === reqId && s.resultEmitted)
          .sort((a, b) => Number(a.rollId || 0) - Number(b.rollId || 0));

        for (let i = 0; i < d20States.length; i += 1) {
          const wrap = d20States[i] && d20States[i].wrap;
          if (!wrap) continue;
          wrap.classList.remove('d20-picked-adv');
          wrap.classList.remove('d20-picked-dis');
        }

        if (mode !== 'advantage' && mode !== 'disadvantage') {
          return;
        }

        for (let i = 0; i + 1 < d20States.length; i += 2) {
          const first = d20States[i];
          const second = d20States[i + 1];

          if (Math.hypot(hint.x, hint.y, hint.z) <= 1e-6) {

        for (let x = -1; x <= 1; x += 2) {

          }
        }

        return {
          faceTransforms,
          faceNormals,

          faceValueById,
        };

            if (grounded) {
              state.groundedFor += dt;
            } else {
              state.groundedFor = 0;
            }

            // Continuous stabilization with locked target to avoid jitter.
            if (state.modelKind === 'd8' && grounded && !state.alignProbeLogged && state.groundedFor >= 0.04) {
              state.alignProbeLogged = true;
              const canStart = alignEnabled
                && state.groundedFor >= alignStartGroundedDelay
                && planarSpeed < alignStartPlanarThreshold
                && alignSpin < alignStartSpinThreshold
                && !state.alignReady;
              console.log(`[dice-d8-align] roll=${rollId} gate groundedFor=${state.groundedFor.toFixed(3)} planar=${planarSpeed.toFixed(3)} spin=${alignSpin.toFixed(2)} ready=${state.alignReady} canStart=${canStart}`);
            }

            if (alignEnabled && grounded && state.groundedFor >= alignStartGroundedDelay && planarSpeed < alignStartPlanarThreshold && alignSpin < alignStartSpinThreshold && !state.alignReady) {
              if (!state.alignTarget) {
                const facePick = resolveAlignTarget(state);
                state.alignTarget = facePick.target;
                state.resultFace = Number(facePick.face || 0);
                state.alignReady = false;
                state.alignStarted = true;
                state.alignStartRz = state.rz;
                if (!isPolyAlign(state)) {
                  state.vrz = 0;
                }
                state.alignMaxRzDelta = 0;
                state.alignFrames = 0;
                state.alignElapsed = 0;
                console.log("[dice-debug] roll=" + rollId + " align-start rx=" + state.rx.toFixed(2) + " ry=" + state.ry.toFixed(2) + " rz=" + state.rz.toFixed(2) + " tx=" + state.alignTarget.rx.toFixed(2) + " ty=" + state.alignTarget.ry.toFixed(2));
                if (state.modelKind === 'd8') {
                  const targetScore = Number(facePick.score === undefined ? -1 : facePick.score);
                  const bottomFace = Number(facePick.bottomFace === undefined ? -1 : facePick.bottomFace);
                  console.log(`[dice-d8-align] roll=${rollId} start face=${state.resultFace} bottom=${bottomFace} rx=${state.rx.toFixed(2)} ry=${state.ry.toFixed(2)} rz=${state.rz.toFixed(2)} tx=${state.alignTarget.rx.toFixed(2)} ty=${state.alignTarget.ry.toFixed(2)} tz=${Number(state.alignTarget.rz || 0).toFixed(2)} score=${targetScore.toFixed(2)}`);
                }
              }

              const target = state.alignTarget;
              state.alignFrames += 1;
              const rzDelta = Math.abs(normalizeAngle(state.rz - state.alignStartRz));
              if (rzDelta > state.alignMaxRzDelta) {
                state.alignMaxRzDelta = rzDelta;
              }
              const alignDistance = computeAlignDistance(state, target);
              const closeness = clamp(1 - alignDistance / 180, 0, 1);
              const settleGate = clamp((1.18 - planarSpeed) / 1.18, 0, 1) * clamp((210 - alignSpin) / 210, 0, 1);

              const slowZone = clamp((0.58 - planarSpeed) / 0.58, 0, 1);
              const plopBoost = slowZone * slowZone * (0.24 + closeness * 0.56) * alignPlopBoost;
              const baseAssist = (0.014 + closeness * 0.11) * settleGate * alignSpeedBoost;
              const assist = baseAssist + plopBoost;

              const tMax = alignConfig.tMax;
              const t = clamp(assist * dt * 60, 0, tMax);
              applyAlignOrientationStep(state, target, t, alignConfig);

              // Kill shaking once close to stable face-up orientation.
              const forceSnapDistance = alignConfig.forceSnapDistance;
              const forceSnap = state.groundedFor > alignForceSnapDelay && alignDistance < forceSnapDistance;
              if (alignDistance < 3.2 || forceSnap) {
                applyAlignSnap(state, target);
                
                state.vrx = 0;
                state.vry = 0;
                state.vrz = 0;
                state.alignReady = true;
                if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs <= 0) {
                  state.resultMeasureAtMs = ts + resultMeasureDelayMs;
                }
                console.log(`[dice-debug] roll=${rollId} align-end reason=${forceSnap ? "force" : "normal"} ad=${alignDistance.toFixed(3)} rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} frames=${state.alignFrames}`);
                if (state.modelKind === 'd8') {
                  const d8Normals = getDiceSpec('d8').faceNormals;
                  const n = d8Normals[Math.max(0, Math.min(d8Normals.length - 1, Number(state.resultFace || 1) - 1))];
                  const nw = rotateVec(n, state.rx, state.ry, state.rz);
                  const upNow = normalizeVec3(nw.x, nw.y, nw.z).z;
                  console.log(`[dice-d8-align] roll=${rollId} end reason=${forceSnap ? "force" : "normal"} face=${state.resultFace} ad=${alignDistance.toFixed(3)} frames=${state.alignFrames} upNow=${upNow.toFixed(4)} rz=${state.rz.toFixed(2)}`);
                }
              } else {
                state.vrx *= 0.66;
                state.vry *= 0.72;
                state.vrz *= 0.66;
              }
            } else if (!grounded) {
              if (state.alignStarted && !state.alignReady) {
                console.log(`[dice-debug] roll=${rollId} align-abort rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} frames=${state.alignFrames}`);
              }
              state.alignTarget = null;
              state.alignReady = false;
              state.alignStarted = false;
              state.alignElapsed = 0;
              state.alignProbeLogged = false;
            }


            const resting = grounded && planarSpeed < 0.025 && alignSpin < 2.4 && (alignEnabled ? state.alignReady : true);
            if (resting) {
              state.settledFor += dt;
            } else {
              state.settledFor = 0;
            }

            if (state.settledFor > 0.34) {
              console.log(`[dice-debug] roll=${rollId} hold-enter rz=${state.rz.toFixed(2)} rzMaxDelta=${state.alignMaxRzDelta.toFixed(2)} alignReady=${state.alignReady}`);
              if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs <= 0) {
                state.resultMeasureAtMs = ts + resultMeasureDelayMs;
              }
              state.vx = 0;
              state.vy = 0;
              state.vz = 0;
              state.vrx = 0;
              state.vry = 0;
              state.vrz = 0;
              state.phase = 'hold';
              state.phaseTime = 0;
            }
          } else if (state.phase === 'hold') {
            state.phaseTime += dt;
            state.z = 0;
          }

          if (!state.resultEmitted && state.requestId > 0 && state.resultMeasureAtMs > 0 && ts >= state.resultMeasureAtMs) {
            state.resultFace = resolveResultFace(state);
            if (state.resultFace > 0) {
              state.resultEmitted = true;
              const resultSides = Number((state.diceSpec && state.diceSpec.sides) || 6);
              applyD20CritVisual(state);
              if (String(state.modelKind || '') === 'd20') {
                applyD20PairOutcomeVisuals(state.requestId);
              }
              console.log(`[dice-result] request=${state.requestId} sides=${resultSides} value=${state.resultFace}`);
            }
          }

          render(state);
          raf = requestAnimationFrame(frame);
        }

        raf = requestAnimationFrame(frame);
      };
    })();
  </script>
</body>
